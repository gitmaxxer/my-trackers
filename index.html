<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Trackers</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f3ee;
      --surface: #ffffff;
      --border: #e2ddd6;
      --text-primary: #1a1814;
      --text-secondary: #6b6560;
      --text-muted: #a09a94;
      --accent: #2a5caa;
      --accent-light: #e8eef8;
      --tag-bg: #eef4ff;
      --tag-text: #1e428a;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 0;
    }

    header {
      padding: 3rem 2.5rem 2rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    header p {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      font-weight: 500;
    }

    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 400;
      color: var(--text-primary);
      line-height: 1.1;
    }

    header h1 span {
      color: var(--accent);
    }

    .subtitle {
      margin-top: 0.75rem;
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 300;
    }

    main {
      padding: 2.5rem;
      max-width: 960px;
    }

    .section-label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 500;
      margin-bottom: 1.25rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.2s ease;
    }

    .card:hover {
      border-color: #c5cfe8;
      box-shadow: 0 4px 20px rgba(42, 92, 170, 0.08);
      transform: translateY(-2px);
    }

    .card:hover::before {
      transform: scaleX(1);
    }

    .card-icon {
      width: 40px;
      height: 40px;
      background: var(--accent-light);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-icon svg {
      width: 20px;
      height: 20px;
      stroke: var(--accent);
      fill: none;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .card-body h2 {
      font-size: 16px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .card-body p {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
      font-weight: 300;
    }

    .card-footer {
      margin-top: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .tag {
      font-size: 11px;
      background: var(--tag-bg);
      color: var(--tag-text);
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .arrow {
      width: 28px;
      height: 28px;
      background: var(--accent-light);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    .card:hover .arrow {
      background: var(--accent);
    }

    .arrow svg {
      width: 14px;
      height: 14px;
      stroke: var(--accent);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke 0.15s;
    }

    .card:hover .arrow svg {
      stroke: #fff;
    }

    .empty-card {
      background: transparent;
      border: 1.5px dashed var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 160px;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 300;
    }

    .empty-card svg {
      width: 22px;
      height: 22px;
      stroke: var(--text-muted);
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    footer {
      padding: 2rem 2.5rem;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 300;
    }
  </style>
</head>
<body>

  <header>
    <p>Home</p>
    <h1>My <span>Trackers</span></h1>
    <p class="subtitle">All your tools in one place</p>
  </header>

  <main>
    <p class="section-label">Active</p>
    <div class="grid">

      <a href="cfa_study_tracker.html" class="card">
        <div class="card-icon">
          <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        </div>
        <div class="card-body">
          <h2>CFA study tracker</h2>
          <p>Track study progress, topics, and exam readiness across all CFA levels.</p>
        </div>
        <div class="card-footer">
          <span class="tag">Finance</span>
          <div class="arrow">
            <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </div>
        </div>
      </a>

      <div class="empty-card">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add another tracker
      </div>

    </div>
  </main>

  <footer>
    To add a new tracker, upload the HTML file to your repo and add a new card in <code>index.html</code>.
  </footer>

</body>
</html>
